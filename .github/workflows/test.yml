name: Run Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      COVERAGE_DIR: ${{ github.workspace }}/TestResults/coverage/
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'
      
      - name: Restore dependencies
        run: dotnet restore

      - name: Check formatting
        run: dotnet format style --no-restore --verify-no-changes && dotnet format analyzers --no-restore --verify-no-changes
      
      - name: Build
        run: dotnet build --no-restore --configuration Release
      
      - name: Run tests with coverage
        run: |
          mkdir -p "$COVERAGE_DIR"
          dotnet test "JAIMES AF.Tests/JAIMES AF.Tests.csproj" \
            --no-build \
            --configuration Release \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat="cobertura,opencover" \
            /p:CoverletOutput=$COVERAGE_DIR \
            /p:UseSourceLink=true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: ${{ github.workspace }}/TestResults/coverage/

  sonar:
    name: Build and analyze
    runs-on: windows-latest
    needs: test
    env:
      SONAR_DOTNET_COVERAGE_REPORTS: ${{ runner.temp }}\coverage\coverage.opencover.xml

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: ${{ runner.temp }}\coverage

      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_SCANNER: ${{ runner.temp }}\scanner\dotnet-sonarscanner
        shell: powershell
        run: |
          & $env:SONAR_SCANNER begin /k:"IntegerMan_JAIMES-AF" /o:"integerman-github" /d:sonar.token="$env:SONAR_TOKEN"
          dotnet build
          & $env:SONAR_SCANNER end /d:sonar.token="$env:SONAR_TOKEN"
